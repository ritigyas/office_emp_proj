<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Leave Requests</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f8;
      padding: 40px;
    }

    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }

    form {
      max-width: 100%;
      margin: 0 auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    th, td {
      padding: 12px 15px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background-color: #007bff;
      color: white;
      font-weight: bold;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    tr:hover {
      background-color: #eef6ff;
    }

    select, button {
      padding: 6px 10px;
      font-size: 14px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }

    button {
      background-color: #28a745;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #218838;
    }

    @media (max-width: 768px) {
      table, thead, tbody, th, td, tr {
        display: block;
      }

      tr {
        margin-bottom: 20px;
        border: 1px solid #ddd;
        padding: 10px;
        border-radius: 8px;
        background-color: white;
      }

      th {
        display: none;
      }

      td {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid #eee;
      }

      td::before {
        content: attr(data-label);
        font-weight: bold;
        color: #555;
      }

      td:last-child {
        border-bottom: none;
      }
    }
  </style>
</head>
<body>
  <h2>Leave Requests</h2>

  <form method="POST">
    {% csrf_token %}
    <table>
      <thead>
        <tr>
          <th>Employee</th>
          <th>Category</th>
          <th>Dates</th>
          <th>Reason</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        {% for l in leaves %}
        <tr>
          <td data-label="Employee">{{ l.employee.first_name }} {{ l.employee.last_name }}</td>
          <td data-label="Category">{{ l.category }}</td>
          <td data-label="Dates">{{ l.start_date }} to {{ l.end_date }}</td>
          <td data-label="Reason">{{ l.reason }}</td>
          <td data-label="Status">{{ l.status }}</td>
          <td data-label="Action">
            <input type="hidden" name="leave_id" value="{{ l.id }}">
            <select name="status">
              <option value="Pending" {% if l.status == "Pending" %}selected{% endif %}>Pending</option>
              <option value="Approved" {% if l.status == "Approved" %}selected{% endif %}>Approved</option>
              <option value="Rejected" {% if l.status == "Rejected" %}selected{% endif %}>Rejected</option>
            </select>
            <hr>
            <button type="submit">Update</button>
        </hr>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </form>
</body>
</html>
